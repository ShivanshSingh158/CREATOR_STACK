<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g transform="translate(15, 15)">
    <!-- Blue Card (Bottom) -->
    <!-- Shadow -->
    <rect x="25" y="35" width="45" height="30" rx="2" fill="black" transform="rotate(-15 47 50)" />
    <!-- Card -->
    <rect x="20" y="30" width="45" height="30" rx="2" fill="#0f3460" stroke="black" stroke-width="4" stroke-linejoin="round" transform="rotate(-15 42 45)" />
    
    <!-- White Card (Middle) -->
    <!-- Shadow -->
    <rect x="15" y="20" width="45" height="30" rx="2" fill="black" transform="rotate(-5 37 35)" />
    <!-- Card -->
    <rect x="10" y="15" width="45" height="30" rx="2" fill="white" stroke="black" stroke-width="4" stroke-linejoin="round" transform="rotate(-5 32 30)" />

    <!-- Red Card (Top) -->
    <!-- Shadow -->
    <rect x="5" y="5" width="45" height="30" rx="2" fill="black" transform="rotate(5 27 20)" />
    <!-- Card -->
    <rect x="0" y="0" width="45" height="30" rx="2" fill="#e8473f" stroke="black" stroke-width="4" stroke-linejoin="round" transform="rotate(5 22 15)" />
  </g>
</svg>
